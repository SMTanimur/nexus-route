name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # ─── Build ALL binaries on a single cheap Ubuntu runner ───────────
  build-binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout Private Frontend
        uses: actions/checkout@v4
        with:
          repository: SMTanimur/nexus-gate
          token: ${{ secrets.API_REPO_ACCESS }}
          path: nexus-front

      - name: Copy frontend files to root
        run: |
          node -e "const fs = require('fs'); const path = require('path'); fs.cpSync('nexus-front', '.', { recursive: true, force: true, filter: (src) => !['package.json', 'package-lock.json', 'bun.lockb', '.git', '.github', 'README.md'].includes(path.basename(src)) });"

      - name: Checkout Private Backend
        uses: actions/checkout@v4
        with:
          repository: SMTanimur/api.nexus-gate
          token: ${{ secrets.API_REPO_ACCESS }}
          path: nexus-api

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.17

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          cd nexus-api && npm install --legacy-peer-deps

      - name: Build backend
        run: cd nexus-api && npm run build

      - name: Build frontend
        run: npm run build:web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4444

      - name: Cross-compile all platform binaries (Linux, macOS, Windows)
        run: |
          mkdir -p bin
          bun build --compile --minify --target=bun-linux-x64 cli/index.ts --outfile bin/nexusgate-linux-x64
          bun build --compile --minify --target=bun-darwin-arm64 cli/index.ts --outfile bin/nexusgate-darwin-arm64
          bun build --compile --minify --target=bun-windows-x64 cli/index.ts --outfile bin/nexusgate-windows-x64.exe

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: nexusgate-linux-x64
          path: bin/nexusgate-linux-x64

      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        with:
          name: nexusgate-darwin-arm64
          path: bin/nexusgate-darwin-arm64

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: nexusgate-windows-x64.exe
          path: bin/nexusgate-windows-x64.exe

  # ─── Build Docker image ───────────────────────────────────────
  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout Private Frontend
        uses: actions/checkout@v4
        with:
          repository: SMTanimur/nexus-gate
          token: ${{ secrets.API_REPO_ACCESS }}
          path: nexus-front

      - name: Copy frontend files to root
        run: |
          node -e "const fs = require('fs'); const path = require('path'); fs.cpSync('nexus-front', '.', { recursive: true, force: true, filter: (src) => !['package.json', 'package-lock.json', 'bun.lockb', '.git', '.github', 'README.md'].includes(path.basename(src)) });"

      - name: Checkout Private Backend
        uses: actions/checkout@v4
        with:
          repository: SMTanimur/api.nexus-gate
          token: ${{ secrets.API_REPO_ACCESS }}
          path: nexus-api

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: nexusgate:latest

      - name: Save image
        run: docker save nexusgate:latest | gzip > nexusgate-docker.tar.gz

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: nexusgate-docker
          path: nexusgate-docker.tar.gz

  # ─── Publish to NPM ───────────────────────────────────────────
  publish-npm:
    needs: [build-binaries, build-docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout Private Frontend
        uses: actions/checkout@v4
        with:
          repository: SMTanimur/nexus-gate
          token: ${{ secrets.API_REPO_ACCESS }}
          path: nexus-front

      - name: Copy frontend files to root
        run: |
          node -e "const fs = require('fs'); const path = require('path'); fs.cpSync('nexus-front', '.', { recursive: true, force: true, filter: (src) => !['package.json', 'package-lock.json', 'bun.lockb', '.git', '.github', 'README.md'].includes(path.basename(src)) });"

      - name: Checkout Private Backend
        uses: actions/checkout@v4
        with:
          repository: SMTanimur/api.nexus-gate
          token: ${{ secrets.API_REPO_ACCESS }}
          path: nexus-api

      - name: Clean backend git files for NPM
        run: |
          rm -rf nexus-api/.git
          rm -f nexus-api/.gitignore

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          cd nexus-api && npm install --legacy-peer-deps

      - name: Build all
        run: npm run build:all

      - name: Clean up temporary frontend folder
        run: |
          node -e "const fs = require('fs'); fs.rmSync('nexus-front', { recursive: true, force: true });"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── Create GitHub Release ────────────────────────────────────
  release:
    needs: [build-binaries, build-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/nexusgate-linux-x64/nexusgate-linux-x64
            artifacts/nexusgate-darwin-arm64/nexusgate-darwin-arm64
            artifacts/nexusgate-windows-x64.exe/nexusgate-windows-x64.exe
            artifacts/nexusgate-docker/nexusgate-docker.tar.gz
