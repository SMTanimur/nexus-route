services:
  nexusgate:
    build: .
    ports:
      - "4200:4200"
      - "4444:4444"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/nexusgate
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-default-encryption-key-change-me}
      - JWT_SECRET=${JWT_SECRET:-default-jwt-secret-change-me}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo-data:
